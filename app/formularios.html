 <!--Registro -->
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="text-center text-primary fw-bold mb-3">REGISTRO</h2>
                        <p class="text-center text-muted mb-4">Ingrese su correo y contraseña para registrarse</p>
                        
                        <form>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="email" class="form-label fw-medium">Correo electrónico</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light">@</span>
                                        <input type="email" id="email" class="form-control form-control-lg" placeholder="correo@ejemplo.com" name="email" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label for="pswd" class="form-label fw-medium">Contraseña</label>
                                    <input type="password" id="pswd" class="form-control form-control-lg" placeholder="Ingresa tu contraseña" name="pswd" required>
                                </div>
                                <div class="col-12 mt-4">
                                    <button type="submit" class="btn btn-primary w-100 btn-lg fw-medium">Registrarse</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Login -->
   <section id="login" class="bg-light py-5">
    <div class="container">
        <h2 class="text-center mb-4 text-primary">LOGIN</h2>

        <form class="col-md-6 mx-auto p-4 bg-white rounded border">
            <div class="mb-3">
                <label for="correo" class="form-label">Correo electrónico</label>
                <input type="email" id="correo" class="form-control" placeholder="tu@correo.com" required>
            </div>
            <div class="mb-3">
                <label for="contrasena" class="form-label">Contraseña</label>
                <input type="password" id="contrasena" class="form-control" placeholder="Ingresa tu contraseña" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Bienvenido</button>
        </form>
    </div>
</section>
